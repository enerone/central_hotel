# docker-compose.test.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml up
# Sets APP_ENV=test and disables nginx for test runs.
services:
  app:
    command: pytest
    environment:
      APP_ENV: test

  db:
    environment:
      POSTGRES_MULTIPLE_DATABASES: hotel,hotel_test

  nginx:
    profiles:
      - disabled
