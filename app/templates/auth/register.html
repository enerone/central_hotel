{% extends "base.html" %}
{% block title %}Crear cuenta — Sistema Hotel{% endblock %}
{% block content %}
<div class="flex min-h-screen items-center justify-center">
    <div class="w-full max-w-md p-8 bg-white rounded-xl shadow">
        <h1 class="text-2xl font-bold mb-6">Crear cuenta</h1>
        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 rounded p-3 mb-4 text-sm">{{ error }}</div>
        {% endif %}
        <form method="post" action="/register">
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">Nombre completo</label>
                <input type="text" name="full_name" required
                    class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="email" name="email" required
                    class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium mb-1">Contraseña</label>
                <input type="password" name="password" required minlength="8"
                    class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p class="text-xs text-gray-500 mt-1">Mínimo 8 caracteres</p>
            </div>
            <button type="submit"
                class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 font-medium">
                Crear cuenta
            </button>
        </form>
        <p class="text-sm text-gray-600 mt-4">
            ¿Ya tenés cuenta? <a href="/login" class="text-blue-600 hover:underline">Iniciá sesión</a>
        </p>
    </div>
</div>
{% endblock %}
